<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions matching the sage green theme -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(90, 35%, 96%);stop-opacity:1" />
      <stop offset="50%" style="stop-color:hsl(45, 40%, 92%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(50, 45%, 98%);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#mainGradient)"/>
  
  <!-- Bottom wave -->
  <path d="M 0 900 Q 480 850 960 900 T 1920 900 L 1920 1080 L 0 1080 Z" 
        fill="hsla(85, 45%, 58%, 0.15)" opacity="0.6"/>
  
  <path d="M 0 950 Q 640 920 1280 950 T 1920 950 L 1920 1080 L 0 1080 Z" 
        fill="hsla(120, 25%, 92%, 0.5)" opacity="0.5"/>
</svg>